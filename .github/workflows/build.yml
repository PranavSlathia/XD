name: Build dh-api image

on:
  push:
    branches: [main]
    paths:
      - 'dh/**'
      - 'alembic/**'
      - 'Dockerfile.python'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'compose.yml'
      - '.github/workflows/build.yml'
      - 'tests/**'
      - 'web/**'
  workflow_dispatch: {}

# Prevent fork PRs (or any non-canonical-repo push) from running on the runner.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.repository == 'PranavSlathia/XD' && github.event_name != 'pull_request'
    runs-on: [self-hosted, linux, dh-dell]
    timeout-minutes: 15

    steps:
      - name: Sync repo on Dell
        working-directory: /home/pronav/docker/domain-hunter
        run: |
          set -euo pipefail
          git fetch --prune origin
          git reset --hard origin/main

      - name: Install dev deps
        working-directory: /home/pronav/docker/domain-hunter
        run: |
          set -euo pipefail
          uv sync --extra dev

      - name: Lint
        working-directory: /home/pronav/docker/domain-hunter
        run: |
          set -euo pipefail
          uv run ruff check dh tests || true   # baseline has pre-existing PLC0415 lazy-imports; tracked but not gating yet

      - name: Type check
        working-directory: /home/pronav/docker/domain-hunter
        run: |
          set -euo pipefail
          uv run basedpyright dh tests || true   # baseline has pre-existing errors; we track but don't gate yet

      - name: Tests (unit)
        working-directory: /home/pronav/docker/domain-hunter
        run: |
          set -euo pipefail
          uv run pytest tests/ -q

  build:
    needs: test
    if: github.repository == 'PranavSlathia/XD' && github.event_name != 'pull_request'
    runs-on: [self-hosted, linux, dh-dell]
    timeout-minutes: 15

    steps:
      - name: Sync repo on Dell
        working-directory: /home/pronav/docker/domain-hunter
        run: |
          set -euo pipefail
          git fetch --prune origin
          git reset --hard origin/main

      - name: Build dh-api image
        working-directory: /home/pronav/docker/domain-hunter
        run: |
          set -euo pipefail
          docker compose build dh-api

      - name: Restart dh-api if it was already running
        working-directory: /home/pronav/docker/domain-hunter
        run: |
          set -euo pipefail
          if docker ps --filter name=^dh-api$ --format '{{.Names}}' | grep -q '^dh-api$'; then
            docker compose --profile api up -d dh-api
            echo "dh-api restarted"
          else
            echo "dh-api not running; skipping restart (Phase 1+ will bring it up)"
          fi

      - name: Sanity check (dh-pg still healthy)
        run: |
          set -euo pipefail
          docker exec dh-pg pg_isready -U dh -d dh
